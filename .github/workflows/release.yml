name: Build & publish runner image

# Trigger : push d'un tag SemVer (v1.2.3) OU lancement manuel.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de l'image (default: latest)"
        required: false
        default: "latest"
      qa_saas_ref:
        description: "Branch ou tag de qa-saas a embarquer"
        required: false
        default: "main"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "extra=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
            echo "extra=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/salutcava/prod-watch-runner:${{ steps.tags.outputs.tag }}
            ${{ steps.tags.outputs.extra && format('ghcr.io/salutcava/prod-watch-runner:{0}', steps.tags.outputs.extra) || '' }}
          # Le token de pull qa-saas est passe via Docker BuildKit secrets
          # (pas en --build-arg) pour eviter sa fuite dans le cache de build.
          # Le secret est consomme uniquement par le RUN `git clone` du Dockerfile.
          secrets: |
            github_token=${{ secrets.QA_SAAS_PULL_TOKEN }}
          build-args: |
            QA_SAAS_REF=${{ inputs.qa_saas_ref || 'main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
